[features]
codex_hooks = true

[mcp_servers.abap]
args = [
    "--mode",
    "hyperfocused",
]
command = "./vsp"

[mcp_servers.abap.env]
SAP_ALLOWED_PACKAGES = "Z*,$TMP,$ZADT_VSP,$VSP_ADT"
SAP_FEATURE_ABAPGIT = "on"
SAP_FEATURE_RAP = "on"
SAP_FEATURE_TRANSPORT = "on"
SAP_FEATURE_UI5 = "on"
SAP_MODE = "hyperfocused"

[mcp_servers.abap-docs]
url = "https://mcp-abap.marianzeis.de/mcp"

[mcp_servers.sap-docs]
url = "https://mcp-sap-docs.marianzeis.de/mcp"

[[skills.config]]
enabled = true
path = "docs"
