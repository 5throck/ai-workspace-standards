# gitleaks configuration — workspace root
# Docs: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

title = "ai-workspace-standards gitleaks config"

[extend]
# Inherit all default rules from the upstream gitleaks config
useDefault = true

[allowlist]
description = "Allowlist for known false positives in this workspace"
# Regex patterns on the matched secret value
regexes = [
  # Placeholder values in .env.sample and docs
  '''your[_-]?(api[_-]?)?key[_-]?here''',
  '''your[_-]?secret[_-]?here''',
  '''replace[_-]?with[_-]?actual''',
  '''example[_\-.]com''',
  # All-caps placeholder tokens used in documentation examples
  '''YOUR_API_KEY''',
  '''YOUR_TOKEN''',
  '''YOUR_SECRET''',
  # gitleaks:allow inline marker (single-line suppression)
  '''gitleaks:allow''',
]
# Paths to skip entirely
paths = [
  '''\.env\.sample''',
  # CHANGELOG entries describe changes by title only — no secret values expected
  # If a real secret is found here, remove this exclusion and fix the entry
  '''CHANGELOG\.(md|txt)$''',
  '''.*_test\.(js|ts|py|go|rs)$''',
  '''.*\.test\.(js|ts)$''',
  '''.*_spec\.rb$''',
  # co-security agent docs legitimately discuss credentials/secrets as subject matter
  '''templates/co-security/agents/.*\.md$''',
  # Other projects in workspace root — not part of this repo's audit scope
  # .env files are gitignored; --no-git mode scans them anyway — exclude here
  '''\.env$''',
  # L2 Projects/ directory contains user engagements — outside audit scope
  '''Projects/''',
  '''abap_coding_mig/''',
  '''abap_vibe_coding/''',
  '''abap_vibe_coding_mig/''',
  '''abap_vibe_coding_plugin/''',
  '''ai_workspace/''',
  '''artifacts/''',
  '''Crypto-Agent/''',
  '''daniel-lightrag-mcp/''',
  '''dart-mcp/''',
  '''demo/''',
  '''mcp-server-datahub/''',
  '''notebooklm-mcp-cli/''',
  '''PDF-Viewer/''',
  '''Pricing-Mgmt-Simulation/''',
  '''Product-Planning/''',
  '''quickdl/''',
  '''scratch/''',
  '''vibing-steampunk/''',
]
