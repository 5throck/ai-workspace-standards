<!DOCTYPE html>
<!--
  pitch/template.html — co-deck Pitch Theme Skeleton
  ===================================================
  Rendering paradigm: floating card, viewport-relative (not fixed 1280×720).
  Navigation: bottom footer bar — prev/next buttons, TOC drawer, script toggle.
  Transition: ppt-engine TransitionEngine (Fade/Push/Zoom) — pitch CSS card
              animation (.slide → .slide.active) is preserved as "none" default.

  HOW TO USE:
    html-build reads this template and:
    1. Injects <html data-theme="pitch" data-style="<style>"> attributes
    2. Replaces [INJECT:CSS] with base.css + ppt-engine.css + theme.css + style.css <link> tags
    3. Replaces [INJECT:slideData] with: const slideData = [...];
    4. [INJECT:slides] is satisfied at RUNTIME by renderSlide()/initSlides()
       defined in this template's <script>. html-build injects slideData only and
       MUST NOT hand-author .slide divs — leave the presentation container empty.

  CONTENT RULES (from theme.json):
    - max 4 bullets per slide, max 28 chars in title
    - script field → speaker notes panel (presenter-facing, hidden by default)
    - divider slides must include a visualImage for the right panel

  STYLE VARIABLES: all visual values come from CSS variables — never hardcode.
-->
<html lang="ko" data-theme="pitch" data-style="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- INJECT:title --></title>
  <!-- INJECT:CSS -->
  <!-- Load order (replaced by html-build): base.css → ppt-engine.css → theme.css → style.css.
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../themes/_shared/ppt-engine.css">
  <link rel="stylesheet" href="../../themes/pitch/theme.css">
  <link rel="stylesheet" href="../../styles/classic/style.css">
  -->
</head>
<body class="transition-fade">

  <!-- TOC drawer -->
  <button class="toc-toggle" onclick="toggleTOC()" aria-label="목차 열기/닫기"><span class="chev">›</span></button>
  <div class="toc-overlay" id="toc-overlay" onclick="closeTOC()"></div>
  <div class="toc-drawer" id="toc-drawer" aria-label="슬라이드 목차">
    <div class="toc-header">
      <span class="toc-title">슬라이드 목차</span>
      <button class="toc-close-btn" onclick="closeTOC()" aria-label="닫기">&times;</button>
    </div>
    <ul class="toc-list" id="toc-list">
      <!-- Populated by TOCBuilder.init() -->
    </ul>
  </div>

  <!-- Script panel (speaker notes) -->
  <div class="script-panel" id="script-panel" role="note" aria-live="polite">
    <div class="script-label">발표자 노트</div>
    <div id="script-text"></div>
  </div>

  <!-- Presentation area -->
  <div class="presentation-container" id="presentation">
    <!-- INJECT:slides -->
    <!--
      RUNTIME RENDERING: each .slide div is constructed at runtime by
      renderSlide(data, index) / initSlides() defined in this template's <script>.
      html-build injects slideData only (via INJECT:slideData) and MUST NOT
      hand-author .slide divs here — leave this container empty.

      Each rendered slide has the shape:
        <div class="slide" id="slide-${index}" data-type="title|divider|profile|standard|contact">
          ... native pitch-theme child nodes ...
        </div>
      First slide gets class="slide active".

      Slide types (data-type from slideType()):
        title    → type:'title'|isTitleSlide:true   — centered cover (slide-eyebrow, slide-title, slide-subtitle, slide-meta)
        divider  → type:'divider'|isDividerSlide:true — divider-left (divider-part, divider-title, divider-desc) + divider-right (img)
        profile  → type:'profile'|isProfileSlide:true — profile-eyebrow, profile-name, profile-affiliation, profile-bio
        contact  → type:'contact'|isContactSlide:true — contact-title + contact-info (contactEmail / contactLinkedIn)
        punchline→ type:'punchline'|isPunchlineSlide:true — centered headline
        standard → (default)           — slide-content grid: slide-left (slide-section, slide-title, slide-bullets) + right-panel (img or slide-visual)

      SlideData fields used by pitch theme:
        section, title, headline, bullets[], subtitle, meta,
        type, isTitleSlide, isDividerSlide, isProfileSlide, isContactSlide, isPunchlineSlide,
        partNum, desc, script, scriptEn, scriptJa, visualImage, visualTitle, visualDisplay,
        speakerName, profileName, speakerTitle, profileTitle, speakerBio,
        contactEmail, contactLinkedIn, contactPhone
    -->
  </div>

  <!-- Footer bar -->
  <footer class="ppt-footer" id="ppt-footer">
    <div class="footer-left">
      <button class="footer-btn" id="toc-btn" onclick="toggleTOC()" aria-label="목차 열기/닫기" title="목차">☰ 목차</button>
      <span class="slide-counter" id="slide-counter">1 / 1</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>
    <div class="footer-right">
      <button class="transition-btn" data-mode="fade" onclick="TransitionEngine.setMode('fade')" title="Fade 전환">Fade</button>
      <button class="transition-btn" data-mode="push" onclick="TransitionEngine.setMode('push')" title="Push 전환">Push</button>
      <button class="transition-btn" data-mode="zoom" onclick="TransitionEngine.setMode('zoom')" title="Zoom 전환">Zoom</button>
      <button class="footer-btn" id="script-btn" onclick="PresenterTools.toggleScript()" aria-label="발표자 노트 보기/숨기기" title="발표자 노트">📝 노트</button>
      <!-- TTS controls group -->
      <div class="footer-tts-group">
        <div class="narration-dropdown-wrap">
          <button class="footer-btn" id="voice-lang-btn" onclick="NarrationEngine._toggleLanguageDropdown()" aria-label="언어 선택" title="언어 선택">KR ▾</button>
          <div class="voice-lang-dropdown" id="voice-lang-dropdown"></div>
        </div>
        <button class="footer-btn" id="narration-play-btn" onclick="NarrationEngine.togglePlay()" aria-label="음성 재생" title="음성 재생 (P)">▶ Play</button>
        <div class="narration-dropdown-wrap">
          <button class="footer-btn" id="voice-select-btn" onclick="NarrationEngine._toggleVoiceDropdown()" aria-label="음성 선택" title="음성 선택">🎤 Default</button>
          <div class="voice-select-dropdown" id="voice-select-dropdown"></div>
        </div>
      </div>
      <!-- Slide advance controls group -->
      <div class="footer-slide-group">
        <button class="footer-btn" id="narration-auto-advance-btn" onclick="NarrationEngine.toggleAutoAdvance()" aria-label="자동 넘기기" title="자동 넘기기 (A)">⏸ Manual</button>
      </div>
      <button class="footer-btn" id="fullscreen-btn" onclick="FullscreenManager.toggle()" aria-label="전체화면" title="전체화면 (F)">⤢</button>
      <span class="presenter-timer" id="timer-display">00:00</span>
      <button class="footer-btn" id="timer-btn" onclick="PresenterTools.toggleTimer()" aria-label="타이머" title="타이머">⏱</button>
      <button class="nav-btn" onclick="changeSlide(-1)" aria-label="이전 슬라이드">&#8592;</button>
      <button class="nav-btn" onclick="changeSlide(1)" aria-label="다음 슬라이드">&#8594;</button>
    </div>
  </footer>

  <script>
    // <!-- INJECT:slideData -->
    // const slideData = [ ... ];  <-- replaced by html-build

    // ── ppt-engine.js inline (common PPT runtime) ────────────────────
    // NOTE: The shared ppt-engine.js functions (TransitionEngine, PresenterTools,
    // TOCBuilder, NarrationEngine, showSlide, changeSlide, initPPT, toggleTOC,
    // closeTOC, el, imgEl, escapeText, appendInline, renderVisualDisplay) are loaded
    // via <script> inclusion or inlined here.

    // ── Pitch slide renderer ──────────────────────────────────────────
    // Floating card layout: viewport-relative, scale+translateY card animation.
    // Theme CSS drives all visual styling — JS only constructs DOM structure.
    //
    // Slide type detection: supports both modern `type` field and legacy boolean
    // flags (isTitleSlide, isDividerSlide, etc.) for backwards compatibility.

    function slideType(d) {
      if (d.type === 'punchline' || d.isPunchlineSlide) return 'punchline';
      if (d.type === 'title'    || d.type === 'cover' || d.isTitleSlide)   return 'title';
      if (d.type === 'divider'  || d.isDividerSlide)  return 'divider';
      if (d.type === 'profile'  || d.isProfileSlide)  return 'profile';
      if (d.type === 'contact'  || d.isContactSlide)  return 'contact';
      return 'standard';
    }

    // Pitch-native slide children (classes styled by pitch/theme.css + style.css).
    // Appends child nodes onto the slide element; returns nothing.
    function buildSlideChildren(slide, data, index) {
      var type    = slideType(data);
      var section = data.section || '';
      var title   = data.title || data.headline || '';

      if (type === 'title') {
        slide.appendChild(el('div', 'slide-eyebrow', section));
        slide.appendChild(el('h1', 'slide-title', title));
        if (data.subtitle != null) slide.appendChild(el('p', 'slide-subtitle', data.subtitle));
        if (data.meta    != null) slide.appendChild(el('p', 'slide-meta',     data.meta));
        return;
      }
      if (type === 'punchline') {
        slide.appendChild(el('div', 'slide-eyebrow', section));
        slide.appendChild(el('h1', 'slide-title', title));
        return;
      }
      if (type === 'divider') {
        var left = el('div', 'divider-left');
        left.appendChild(el('span', 'divider-part', data.partNum || ''));
        left.appendChild(el('h1', 'divider-title', title));
        if (data.desc != null) left.appendChild(el('p', 'divider-desc', data.desc));
        slide.appendChild(left);
        var right = el('div', 'divider-right');
        if (data.visualImage) {
          var dividerImg = imgEl(data.visualImage, escapeText(title));
          if (data.visualImage.indexOf('/diagrams/') !== -1) dividerImg.classList.add('img-diagram');
          right.appendChild(dividerImg);
        }
        slide.appendChild(right);
        return;
      }
      if (type === 'profile') {
        slide.appendChild(el('div', 'profile-eyebrow', section));
        if (data.visualImage) {
          var avatar = imgEl(data.visualImage, escapeText(data.speakerName || data.profileName || title));
          avatar.className = 'profile-avatar';
          slide.appendChild(avatar);
        }
        slide.appendChild(el('div', 'profile-name',        data.speakerName  || data.profileName  || title));
        slide.appendChild(el('div', 'profile-affiliation', data.speakerTitle || data.profileTitle || ''));
        if (data.speakerBio) slide.appendChild(el('div', 'profile-bio', data.speakerBio));
        return;
      }
      if (type === 'contact') {
        slide.appendChild(el('div', 'contact-title', title));
        var info = el('div', 'contact-info');
        if (data.contactEmail)    info.appendChild(el('div', 'contact-item', data.contactEmail));
        if (data.contactLinkedIn) info.appendChild(el('div', 'contact-item', data.contactLinkedIn));
        if (data.contactPhone)    info.appendChild(el('div', 'contact-item', data.contactPhone));
        slide.appendChild(info);
        return;
      }
      // standard
      var content = el('div', 'slide-content');
      var leftCol = el('div', 'slide-left');
      leftCol.appendChild(el('div', 'slide-section', section));
      leftCol.appendChild(el('h2', 'slide-title', title));
      buildBullets(leftCol, data.bullets);
      content.appendChild(leftCol);

      var rightCol = el('div', 'right-panel');
      if (data.visualImage) {
        var imgElem = imgEl(data.visualImage, escapeText(data.visualTitle || title));
        if (data.visualImage.indexOf('/diagrams/') !== -1) imgElem.classList.add('img-diagram');
        rightCol.appendChild(imgElem);
      } else {
        var visual = el('div', 'slide-visual');
        visual.appendChild(el('div', 'visual-title', data.visualTitle || ''));
        var display = el('div', 'visual-display');
        renderVisualDisplay(display, data.visualDisplay);
        visual.appendChild(display);
        rightCol.appendChild(visual);
      }
      content.appendChild(rightCol);
      slide.appendChild(content);
    }

    function renderSlide(data, index) {
      var slide = el('div', 'slide' + (index === 0 ? ' active' : ''));
      slide.id = 'slide-' + index;
      slide.dataset.type = slideType(data);
      if (data.backgroundImage) {
        slide.style.backgroundImage = 'url(' + data.backgroundImage + ')';
        slide.style.backgroundSize = 'cover';
        slide.style.backgroundPosition = 'center';
      }
      buildSlideChildren(slide, data, index);
      return slide;
    }

    function initSlides() {
      var container = document.getElementById('presentation');
      if (!container || typeof slideData === 'undefined') return;
      while (container.firstChild) container.removeChild(container.firstChild);
      slideData.forEach(function(d, i) { container.appendChild(renderSlide(d, i)); });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    function initAll() {
      try {
        var p = new URLSearchParams(window.location.search);
        var ts = p.get('tocStyle');
        if (ts) document.documentElement.setAttribute('data-toc-style', ts);
      } catch(e) {}
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === '__set_toc_style__') {
          document.documentElement.setAttribute('data-toc-style', e.data.tocStyle);
        }
      });
      initSlides();
      showSlide(0);
      initPPT({ transition: 'none', showTimer: true });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAll);
    } else {
      initAll();
    }
  </script>
</body>
</html>
