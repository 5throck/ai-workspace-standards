<!DOCTYPE html>
<!--
  notebook/template.html — co-deck Notebook Theme Skeleton
  =========================================================
  Rendering paradigm: ruled-paper notebook card, fullscreen centered.
  Navigation: prev/next buttons + chapter tab bar (footer) + arrow keys.
  Transition: opacity fade, 0.35s ease.

  HOW TO USE:
    html-build reads this template and:
    1. Injects <html data-theme="notebook" data-style="<style>"> attributes
    2. Replaces <!-- INJECT:CSS --> with base.css + theme.css + style.css <link> tags
    3. Replaces <!-- INJECT:slideData --> with: const slideData = [...];
    4. <!-- INJECT:slides --> is satisfied at RUNTIME by renderSlide()/initSlides()
       defined in this template's <script>. html-build injects slideData only and
       MUST NOT hand-author .slide divs — leave the presentation container empty.

  CONTENT RULES (from theme.json):
    - max 4 bullets per slide, max 30 chars in title
    - ruled lines fix rhythm — keep each bullet to 1-2 lines
    - divider slides auto-generate chapter tab labels

  SLIDE STRUCTURE per type:
    title    → isTitleSlide:true   — centered cover (cover-rule + eyebrow + title + subtitle)
    divider  → isDividerSlide:true — left-margin indent, left accent border title, desc
    profile  → isProfileSlide:true — centered speaker intro
    contact  → isContactSlide:true — centered contact info
    standard → (default)           — gutter + content (eyebrow, title underline, bullets)

  STYLE VARIABLES: all visual values come from CSS variables — never hardcode.
-->
<html lang="ko" data-theme="notebook" data-style="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- INJECT:title --></title>
  <!-- INJECT:CSS -->
  <!-- Example load order (replaced by html-build): foundation → theme → style.
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../themes/notebook/theme.css">
  <link rel="stylesheet" href="../../styles/classic/style.css">
  -->
</head>
<body>

  <div class="presentation-container" id="presentation">
    <!-- INJECT:slides -->
    <!--
      RUNTIME RENDERING: each .slide div is constructed at runtime by
      renderSlide(data, index) / initSlides() defined in this template's <script>.
      html-build injects slideData only (via INJECT:slideData) and MUST NOT
      hand-author .slide divs here — leave this container empty.

      Each .slide rendered by renderSlide(data, index) follows this structure:

      ── title (isTitleSlide) ──────────────────────────────────────
      <div class="slide active" id="slide-0" data-type="title">
        <div class="slide-inner">
          <div class="cover-eyebrow">{data.meta}</div>
          <div class="cover-rule"></div>
          <div class="cover-title">{data.title}</div>
          <div class="cover-subtitle">{data.subtitle}</div>
        </div>
      </div>

      ── divider (isDividerSlide) ───────────────────────────────────
      <div class="slide" id="slide-N" data-type="divider">
        <div class="slide-inner">
          <div class="divider-part">{data.partNum} / {data.section}</div>
          <div class="divider-title">{data.title}</div>
          <div class="divider-desc">{data.desc}</div>
        </div>
      </div>

      ── standard (default) ────────────────────────────────────────
      <div class="slide" id="slide-N" data-type="standard">
        <div class="slide-inner">
          <div class="slide-body">
            <div class="slide-gutter">
              <span class="gutter-num">{slideIndex}</span>
            </div>
            <div class="slide-content">
              <div class="slide-eyebrow">{data.section}</div>
              <div class="slide-title">{data.title}</div>
              <ul class="slide-bullets">
                <li>{bullet}</li> ...
              </ul>
            </div>
          </div>
        </div>
        <div class="notebook-footer">
          <div class="nb-page">p. {pageNum}</div>
          <div class="nb-tabs" id="nb-tabs-N"><!-- populated by buildTabs() --></div>
        </div>
      </div>
    -->
  </div>

  <button id="nav-prev" onclick="changeSlide(-1)" aria-label="이전 슬라이드">&#8592;</button>
  <button id="nav-next" onclick="changeSlide(1)" aria-label="다음 슬라이드">&#8594;</button>

  <script>
    // <!-- INJECT:slideData -->
    // const slideData = [ ... ];  <-- replaced by html-build

    // ── Slide renderer (authoritative — html-build injects slideData only) ─────
    // The .slide DOM is built at runtime by renderSlide()/initSlides() below.
    // html-build must NOT hand-author .slide divs — it injects slideData (INJECT:slideData)
    // and CSS links only, and leaves the presentation container empty. The renderer
    // constructs DOM with createElement + textContent (text auto-escaped).

    // Strip tags for img alt / text fallbacks.
    function escapeText(s) {
      return String(s == null ? '' : s).replace(/<\/?[^>]+(>|$)/g, '');
    }

    // createElement helper: set className + (optionally) textContent, return node.
    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    // createElement('img'); set .src + .alt; return node.
    function img(src, alt) {
      const node = document.createElement('img');
      node.src = src || '';
      node.alt = alt || '';
      return node;
    }

    // Append inline text with **bold** -> <strong>, all text via textContent (auto-escape).
    function appendInline(parent, s) {
      const parts = String(s == null ? '' : s).split(/\*\*(.*?)\*\*/g);
      for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0) parent.appendChild(document.createTextNode(parts[i]));
        else parent.appendChild(el('strong', null, parts[i]));
      }
    }

    // Build the notebook bullet list. arr: array of bullet strings.
    function buildBullets(parent, arr) {
      const ul = el('ul', 'slide-bullets');
      if (Array.isArray(arr)) {
        arr.forEach(function (b) {
          const li = el('li');
          appendInline(li, b);
          ul.appendChild(li);
        });
      }
      parent.appendChild(ul);
    }

    // Map slideData flags → notebook data-type vocabulary.
    function slideType(d) {
      if (d.isTitleSlide)    return 'title';
      if (d.isDividerSlide)  return 'divider';
      if (d.isProfileSlide)  return 'profile';
      if (d.isContactSlide)  return 'contact';
      return 'standard';
    }

    // Notebook-native slide children (classes styled by notebook/theme.css).
    // Appends child nodes onto the slide element; returns nothing.
    function buildSlideChildren(slide, data, index) {
      const type = slideType(data);
      const inner = el('div', 'slide-inner');

      if (type === 'title') {
        inner.appendChild(el('div', 'cover-eyebrow', data.meta || ''));
        inner.appendChild(el('div', 'cover-rule'));
        inner.appendChild(el('div', 'cover-title', data.title || ''));
        if (data.subtitle != null) inner.appendChild(el('div', 'cover-subtitle', data.subtitle));
        slide.appendChild(inner);
        return;
      }
      if (type === 'divider') {
        inner.appendChild(el('div', 'divider-part', (data.partNum || '') + ' / ' + (data.section || '')));
        inner.appendChild(el('div', 'divider-title', data.title || ''));
        if (data.desc != null) inner.appendChild(el('div', 'divider-desc', data.desc));
        slide.appendChild(inner);
        return;
      }
      if (type === 'profile') {
        inner.appendChild(el('div', 'profile-eyebrow', data.section || ''));
        inner.appendChild(el('div', 'profile-name', data.speakerName || data.title || ''));
        inner.appendChild(el('div', 'profile-affiliation', data.speakerTitle || ''));
        if (data.speakerBio != null) inner.appendChild(el('div', 'profile-bio', data.speakerBio));
        slide.appendChild(inner);
        return;
      }
      if (type === 'contact') {
        inner.appendChild(el('div', 'cover-title', data.title || ''));
        if (data.contactEmail) inner.appendChild(el('div', 'cover-subtitle', data.contactEmail));
        if (data.contactLinkedIn) inner.appendChild(el('div', 'cover-subtitle', data.contactLinkedIn));
        slide.appendChild(inner);
        return;
      }
      // standard
      const body = el('div', 'slide-body');
      const gutter = el('div', 'slide-gutter');
      gutter.appendChild(el('span', 'gutter-num', String(index + 1)));
      body.appendChild(gutter);

      const content = el('div', 'slide-content');
      content.appendChild(el('div', 'slide-eyebrow', data.section || ''));
      content.appendChild(el('div', 'slide-title', data.title || ''));
      buildBullets(content, data.bullets);
      body.appendChild(content);
      inner.appendChild(body);
      slide.appendChild(inner);

      const footer = el('div', 'notebook-footer');
      footer.appendChild(el('div', 'nb-page', 'p. ' + (index + 1)));
      const tabs = el('div', 'nb-tabs');
      tabs.id = 'nb-tabs-' + index;
      footer.appendChild(tabs);
      slide.appendChild(footer);
    }

    function renderSlide(data, index) {
      const slide = el('div', 'slide' + (index === 0 ? ' active' : ''));
      slide.id = 'slide-' + index;
      slide.dataset.type = slideType(data);
      buildSlideChildren(slide, data, index);
      return slide;
    }

    function initSlides() {
      const container = document.getElementById('presentation');
      if (!container || typeof slideData === 'undefined') return;
      while (container.firstChild) container.removeChild(container.firstChild);
      slideData.forEach(function (d, i) { container.appendChild(renderSlide(d, i)); });
    }

    // ── Chapter tabs ──────────────────────────────────────────────────────────
    // chapters: [{label, firstSlide}] built from divider slides
    let chapters = [];

    function buildChapters() {
      chapters = [];
      if (typeof slideData === 'undefined') return;
      slideData.forEach((d, i) => {
        if (d.isDividerSlide) {
          chapters.push({ label: d.title || d.section || ('Ch.' + (chapters.length + 1)), firstSlide: i });
        }
      });
    }

    function renderTabs(activeSlide) {
      if (!chapters.length) return;
      const activeChapter = chapters.reduce((acc, ch, i) => ch.firstSlide <= activeSlide ? i : acc, 0);
      document.querySelectorAll('.nb-tabs').forEach(container => {
        while (container.firstChild) container.removeChild(container.firstChild);
        chapters.forEach((ch, i) => {
          const btn = document.createElement('button');
          btn.className = 'nb-tab' + (i === activeChapter ? ' active' : '');
          btn.textContent = ch.label;
          btn.onclick = () => showSlide(ch.firstSlide);
          container.appendChild(btn);
        });
      });
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    let currentSlide = 0;

    function showSlide(index) {
      const slides = document.querySelectorAll('.slide');
      if (index < 0 || index >= slides.length) return;
      slides.forEach(s => s.classList.remove('active'));
      slides[index].classList.add('active');
      currentSlide = index;
      renderTabs(index);
    }

    function changeSlide(delta) {
      showSlide(currentSlide + delta);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changeSlide(-1);
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      initSlides();
      buildChapters();
      showSlide(0);
    });
  </script>
</body>
</html>
