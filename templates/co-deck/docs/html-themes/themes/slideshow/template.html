<!DOCTYPE html>
<!--
  slideshow/template.html — co-deck Slideshow Theme Skeleton
  ===========================================================
  Rendering paradigm: fullscreen single-slide, one active at a time.
  Navigation: prev/next buttons and left/right arrow keys.
  Transition: CSS opacity + transform (cubic-bezier easing).

  HOW TO USE:
    html-build reads this template and:
    1. Injects <html data-theme="slideshow" data-style="<style>"> attributes
    2. Replaces <!-- INJECT:CSS --> with base.css + style.css <link> tags
    3. Replaces <!-- INJECT:slideData --> with: const slideData = [...];
    4. <!-- INJECT:slides --> is satisfied at RUNTIME by renderSlide()/initSlides()
       defined in this template's <script>. html-build injects slideData only and
       MUST NOT hand-author .slide divs — leave the presentation container empty.

  CONTENT RULES (from theme.json):
    - max 3 bullets per slide, max 20 chars in title
    - one message per slide — prefer visuals over text blocks

  STYLE VARIABLES: all visual values come from CSS variables — never hardcode.
-->
<html lang="ko" data-theme="slideshow" data-style="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- INJECT:title --></title>
  <!-- INJECT:CSS -->
  <!-- Example (replaced by html-build). Load order: foundation → theme → style.
  <link rel="stylesheet" href="../../docs/html-themes/styles/base.css">
  <link rel="stylesheet" href="../../docs/html-themes/themes/slideshow/theme.css">
  <link rel="stylesheet" href="../../docs/html-themes/styles/classic/style.css">
  -->
  <style>
    /* Slideshow-specific layout — not overrideable by style.css */
    body { margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-color, #0b0f19); }
    .presentation-container { position: relative; width: min(92vw, 1300px); aspect-ratio: 16/9; }
    .slide { position: absolute; inset: 0; border-radius: var(--slide-radius, 20px); opacity: 0; pointer-events: none; transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1), transform 0.45s cubic-bezier(0.4,0,0.2,1); transform: scale(0.97) translateY(12px); }
    .slide.active { opacity: 1; pointer-events: auto; transform: scale(1) translateY(0); }
    #nav-prev, #nav-next { position: fixed; top: 50%; transform: translateY(-50%); background: var(--nav-btn-bg, rgba(255,255,255,0.08)); border: 1px solid var(--nav-btn-border, rgba(255,255,255,0.15)); color: var(--nav-btn-color, rgba(255,255,255,0.7)); border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    #nav-prev:hover, #nav-next:hover { background: var(--nav-btn-hover, rgba(255,255,255,0.16)); }
    #nav-prev { left: 16px; }
    #nav-next { right: 16px; }
    #slide-counter { position: fixed; bottom: 20px; right: 24px; font-size: 0.75rem; color: var(--text-muted, rgba(255,255,255,0.4)); letter-spacing: 0.05em; }
  </style>
</head>
<body>

  <div class="presentation-container" id="presentation">
    <!-- INJECT:slides -->
    <!--
      RUNTIME RENDERING: each .slide div is constructed at runtime by
      renderSlide(data, index) / initSlides() defined in this template's <script>
      (container id: presentation). html-build injects slideData only
      (via INJECT:slideData) and MUST NOT hand-author .slide divs here — leave
      this container empty.

      Each rendered slide has the shape:
        <div class="slide" id="slide-${index}" data-type="standard|cover|divider|contact|profile|punchline">
          ... base.css child nodes (.slide-header, .slide-card, etc.) ...
        </div>
      First slide gets class="slide active".
    -->
  </div>

  <button id="nav-prev" onclick="changeSlide(-1)" aria-label="이전 슬라이드">&#8592;</button>
  <button id="nav-next" onclick="changeSlide(1)" aria-label="다음 슬라이드">&#8594;</button>
  <div id="slide-counter"></div>

  <script>
    // INJECT:slideData
    // const slideData = [ ... ];  <-- replaced by html-build

    // ── Slide renderer (authoritative — html-build injects slideData only) ─────
    // The .slide DOM is built at runtime by renderSlide()/initSlides() below.
    // html-build must NOT hand-author .slide divs — it injects slideData (INJECT:slideData)
    // and CSS links only, and leaves the presentation container empty. The renderer constructs
    // DOM with createElement + textContent (text auto-escaped). Vocabulary is base.css plus
    // the slideshow-specific punchline type (large centered statement).

    // Strip tags for img alt / text fallbacks.
    function escapeText(s) {
      return String(s == null ? '' : s).replace(/<\/?[^>]+(>|$)/g, '');
    }

    // createElement helper: set className + (optionally) textContent, return node.
    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    // createElement('img'); set .src + .alt; return node.
    function img(src, alt) {
      const node = document.createElement('img');
      node.src = src || '';
      node.alt = alt || '';
      return node;
    }

    // Append inline text with **bold** -> <strong>, all text via textContent (auto-escape).
    function appendInline(parent, s) {
      const parts = String(s == null ? '' : s).split(/\*\*(.*?)\*\*/g);
      for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0) parent.appendChild(document.createTextNode(parts[i]));
        else parent.appendChild(el('strong', null, parts[i]));
      }
    }

    // Build bullets using base.css vocabulary: .bullets-container > .bullet-item.
    function buildBullets(parent, arr) {
      const container = el('div', 'bullets-container');
      if (Array.isArray(arr)) {
        arr.forEach(function (b) {
          const item = el('div', 'bullet-item');
          appendInline(item, b);
          container.appendChild(item);
        });
      }
      parent.appendChild(container);
    }

    // Map slideData flags → base.css data-type vocabulary (cover, not title) + punchline.
    function slideType(d) {
      if (d.isPunchlineSlide) return 'punchline';
      if (d.isTitleSlide)     return 'cover';
      if (d.isDividerSlide)   return 'divider';
      if (d.isProfileSlide)   return 'profile';
      if (d.isContactSlide)   return 'contact';
      return 'standard';
    }

    // Build the .slide-header with a section label.
    function buildHeader(slide, section) {
      const header = el('div', 'slide-header');
      header.appendChild(el('span', 'section-label', section || ''));
      slide.appendChild(header);
    }

    // slideshow/base.css-native slide children. Appends child nodes; returns nothing.
    function buildSlideChildren(slide, data, index) {
      const type = slideType(data);
      const section = data.section || '';
      const title = data.title || '';

      if (type === 'punchline') {
        const card = el('div', 'slide-card');
        const content = el('div', 'slide-content');
        content.appendChild(el('h2', 'slide-title', title));
        card.appendChild(content);
        slide.appendChild(card);
        return;
      }
      if (type === 'cover') {
        buildHeader(slide, section);
        const card = el('div', 'slide-card');
        const content = el('div', 'slide-content');
        content.appendChild(el('h1', 'slide-title', title));
        if (data.subtitle != null) content.appendChild(el('p', 'slide-subtitle', data.subtitle));
        if (data.meta != null) content.appendChild(el('p', 'cover-meta', data.meta));
        card.appendChild(content);
        slide.appendChild(card);
        return;
      }
      if (type === 'divider') {
        buildHeader(slide, section);
        const card = el('div', 'slide-card');
        const content = el('div', 'slide-content');
        if (data.partNum != null) content.appendChild(el('div', 'part-number', data.partNum));
        content.appendChild(el('h1', 'slide-title', title));
        if (data.desc != null) content.appendChild(el('p', 'slide-subtitle', data.desc));
        card.appendChild(content);
        slide.appendChild(card);
        return;
      }
      if (type === 'profile') {
        buildHeader(slide, section);
        const card = el('div', 'slide-card');
        const content = el('div', 'slide-content');
        content.appendChild(el('h1', 'slide-title', data.speakerName || title));
        if (data.speakerTitle != null) content.appendChild(el('p', 'slide-subtitle', data.speakerTitle));
        if (data.speakerBio != null) content.appendChild(el('p', 'slide-subtitle', data.speakerBio));
        card.appendChild(content);
        slide.appendChild(card);
        return;
      }
      if (type === 'contact') {
        buildHeader(slide, section);
        const card = el('div', 'slide-card');
        const content = el('div', 'slide-content');
        content.appendChild(el('h1', 'slide-title', title));
        if (data.contactEmail) content.appendChild(el('p', 'slide-subtitle', data.contactEmail));
        if (data.contactLinkedIn) content.appendChild(el('p', 'slide-subtitle', data.contactLinkedIn));
        card.appendChild(content);
        slide.appendChild(card);
        return;
      }
      // standard
      buildHeader(slide, section);
      const card = el('div', 'slide-card');
      const content = el('div', 'slide-content');
      content.appendChild(el('h2', 'slide-title', title));
      if (data.subtitle != null) content.appendChild(el('p', 'slide-subtitle', data.subtitle));
      buildBullets(content, data.bullets);
      card.appendChild(content);

      if (data.visualImage) {
        const panel = el('div', 'right-panel');
        panel.appendChild(img(data.visualImage, escapeText(data.visualTitle || title)));
        card.appendChild(panel);
      }
      slide.appendChild(card);
    }

    function renderSlide(data, index) {
      const slide = el('div', 'slide' + (index === 0 ? ' active' : ''));
      slide.id = 'slide-' + index;
      slide.dataset.type = slideType(data);
      buildSlideChildren(slide, data, index);
      return slide;
    }

    function initSlides() {
      const container = document.getElementById('presentation');
      if (!container || typeof slideData === 'undefined') return;
      while (container.firstChild) container.removeChild(container.firstChild);
      slideData.forEach(function (d, i) { container.appendChild(renderSlide(d, i)); });
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    let currentSlide = 0;

    function showSlide(index) {
      const slides = document.querySelectorAll('.slide');
      if (index < 0 || index >= slides.length) return;
      slides.forEach(s => s.classList.remove('active'));
      slides[index].classList.add('active');
      currentSlide = index;
      const counter = document.getElementById('slide-counter');
      if (counter) counter.textContent = (index + 1) + ' / ' + slides.length;
    }

    function changeSlide(delta) {
      showSlide(currentSlide + delta);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changeSlide(-1);
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      initSlides();
      showSlide(0);
    });
  </script>
</body>
</html>
