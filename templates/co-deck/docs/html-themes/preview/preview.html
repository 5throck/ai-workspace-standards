<!DOCTYPE html>
<!--
  preview.html — co-deck Theme x Style Preview Tool
  Uses the PRODUCTION rendering path (buildThemeDeck output) displayed in an iframe.

  Usage: open in browser with URL params:
    preview.html?theme=outline&style=classic
    preview.html?theme=zen&style=minimal

  ─────────────────────────────────────────────────────────────────────────────
  DYNAMIC THEME/STYLE DISCOVERY (file://-safe)
  ─────────────────────────────────────────────────────────────────────────────
  The theme + style dropdowns are populated from `themes-manifest.js`, a static
  JS file generated by scripts/co-deck/generate-themes-manifest.ts.

  WHY: A browser opened via file:// cannot scan the filesystem, and fetch() of
  local JSON is blocked by the file protocol. So we load the manifest via a
  plain <script> tag (which assigns window.__THEMES_MANIFEST__).

  REGENERATE the manifest after adding/removing a theme or style:
      bun scripts/co-deck/generate-themes-manifest.ts

  REGENERATE preview decks after adding/removing a theme or style:
      bun scripts/co-deck/build-theme-preview.ts
  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>co-deck Preview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #111; color: #eee; overflow: hidden; height: 100vh; }

    /* ── Top bar ──────────────────────────────────────────────────────────── */
    #preview-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(0,0,0,0.92); color: #fff;
      padding: 8px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #333;
    }
    #preview-bar label { opacity: 0.7; font-size: 12px; }
    #preview-bar select {
      background: #222; color: #fff; border: 1px solid #555;
      border-radius: 4px; padding: 3px 8px; font-size: 12px;
    }
    #preview-bar .hint { margin-left: auto; opacity: 0.4; font-size: 10px; }
    #preview-bar .badge {
      display: inline-block; padding: 2px 6px; border-radius: 3px;
      font-size: 10px; font-weight: bold;
    }
    #preview-bar .badge-partial { background: #b45309; color: #fff; }
    #preview-bar .badge-incompatible { background: #dc2626; color: #fff; }

    /* ── Iframe container ────────────────────────────────────────────────── */
    #preview-frame-container {
      position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
    }
    #preview-iframe {
      width: 100%; height: 100%; border: none; background: #fff;
    }

    /* ── Error panel (fail-loudly) ───────────────────────────────────────── */
    #error-panel {
      display: none;
      position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
      background: #1a0000; color: #ff6b6b;
      padding: 40px; overflow: auto; z-index: 10;
    }
    #error-panel.visible { display: block; }
    #error-panel h1 { font-size: 1.5em; margin: 0 0 8px; color: #ff4444; }
    #error-panel h2 { font-size: 1.1em; margin: 24px 0 8px; color: #ff8888; border-bottom: 1px solid #440000; padding-bottom: 4px; }
    #error-panel .error-item { padding: 8px 12px; margin: 4px 0; background: rgba(255,0,0,0.08); border-left: 3px solid #ff4444; border-radius: 0 4px 4px 0; }
    #error-panel .error-item pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    #error-panel .copy-btn {
      margin-top: 24px; padding: 8px 16px;
      background: #dc2626; color: #fff; border: none; border-radius: 4px;
      cursor: pointer; font-size: 13px;
    }
    #error-panel .copy-btn:hover { background: #ef4444; }
    #error-panel .copy-btn.copied { background: #16a34a; }

    /* ── Loading state ────────────────────────────────────────────────────── */
    #loading-indicator {
      display: none;
      position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
      background: #111; color: #888;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-direction: column; gap: 12px;
    }
    #loading-indicator.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333; border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="preview-bar">
    <label>Theme:</label>
    <select id="theme-select" onchange="applyParams()"></select>
    <label>Style:</label>
    <select id="style-select" onchange="applyParams()"></select>
    <span id="compat-badge"></span>
    <span class="hint">preview.html?theme=pitch-enhanced&amp;style=classic</span>
  </div>

  <div id="preview-frame-container">
    <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <div id="error-panel">
    <h1>&#x26A0; Preview Rendering Error</h1>
    <p id="error-summary"></p>
    <h2>Contract Errors</h2>
    <div id="contract-errors"></div>
    <h2>Runtime Errors</h2>
    <div id="runtime-errors"></div>
    <button class="copy-btn" onclick="copyErrorDetails()">Copy Error Details</button>
  </div>

  <div id="loading-indicator" class="hidden">
    <div class="spinner"></div>
    <span>Loading preview...</span>
  </div>

  <!-- Manifest: auto-generated, file://-safe global. Regenerate via bun scripts/co-deck/generate-themes-manifest.ts -->
  <script src="themes-manifest.js"></script>
  <script>
    // ── State ─────────────────────────────────────────────────────────────
    var currentTheme = null;
    var currentErrorDetails = { contract: [], runtime: [] };

    // ── Manifest-driven dropdown population ────────────────────────────────
    var MANIFEST = window.__THEMES_MANIFEST__ || { themes: [], styles: [] };

    function populateThemeSelect() {
      var sel = document.getElementById('theme-select');
      var cur = sel.value;
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      for (var i = 0; i < MANIFEST.themes.length; i++) {
        var t = MANIFEST.themes[i];
        var opt = document.createElement('option');
        opt.value = t.name;
        opt.textContent = t.name;
        sel.appendChild(opt);
      }
      if (cur && MANIFEST.themes.some(function(t) { return t.name === cur; })) sel.value = cur;
    }

    function populateStyleSelect(themeName) {
      var sel = document.getElementById('style-select');
      var cur = sel.value;
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      var theme = MANIFEST.themes.find(function(t) { return t.name === themeName; });
      // If the theme is unknown, fall back to the global styles list.
      var styleNames = theme ? theme.styles : MANIFEST.styles;
      var partial = new Set(theme ? (theme.partial_styles || []) : []);
      for (var i = 0; i < styleNames.length; i++) {
        var s = styleNames[i];
        var label = partial.has(s) ? s + ' (\u26A0 partial)' : s;
        var opt = document.createElement('option');
        opt.value = s;
        opt.textContent = label;
        sel.appendChild(opt);
      }
      if (cur && styleNames.indexOf(cur) >= 0) sel.value = cur;
    }

    // ── URL parameter handling ────────────────────────────────────────────
    function getParams() {
      var p = new URLSearchParams(location.search);
      return { theme: p.get('theme') || 'outline', style: p.get('style') || 'classic' };
    }

    function applyParams() {
      var theme = document.getElementById('theme-select').value;
      // Theme changed -> re-populate the style dropdown
      if (theme !== currentTheme) {
        currentTheme = theme;
        populateStyleSelect(theme);
      }
      var style = document.getElementById('style-select').value;

      // Update URL
      var url = new URL(location.href);
      url.searchParams.set('theme', theme);
      url.searchParams.set('style', style);
      history.replaceState(null, '', url);

      loadPreview(theme, style);
    }

    // ── Load preview deck into iframe ─────────────────────────────────────
    function loadPreview(theme, style) {
      var errorPanel = document.getElementById('error-panel');
      var iframe = document.getElementById('preview-iframe');
      var loading = document.getElementById('loading-indicator');
      var badge = document.getElementById('compat-badge');

      // Reset state
      errorPanel.classList.remove('visible');
      currentErrorDetails = { contract: [], runtime: [] };

      // Resolve against manifest (stale URL protection)
      var knownThemes = MANIFEST.themes.map(function(t) { return t.name; });
      if (knownThemes.indexOf(theme) < 0) {
        showError('Theme "' + theme + '" not found in manifest.', ['Theme not found: ' + theme], []);
        return;
      }

      var themeEntry = MANIFEST.themes.find(function(t) { return t.name === theme; });

      // Check if style is in the theme's compatible list
      var isPartial = false;
      if (themeEntry) {
        if (themeEntry.styles.indexOf(style) < 0) {
          // Style not listed at all for this theme
          showError('Style "' + style + '" is not compatible with theme "' + theme + '".',
            ['Style "' + style + '" is not listed in compatible_styles for theme "' + theme + '"'], []);
          return;
        }
        isPartial = (themeEntry.partial_styles || []).indexOf(style) >= 0;
      }

      // Update compat badge
      if (isPartial) {
        badge.innerHTML = '<span class="badge badge-partial">\u26A0 Partial</span>';
      } else {
        badge.innerHTML = '';
      }

      // Determine iframe src
      var deckSrc = 'decks/' + encodeURIComponent(theme) + '_' + encodeURIComponent(style) + '.html';

      // Show loading
      loading.classList.remove('hidden');
      iframe.style.display = 'none';

      // Listen for errors from the iframe
      window.removeEventListener('message', onIframeMessage);
      window.addEventListener('message', onIframeMessage);

      // Set iframe load/error handlers
      iframe.onload = function() {
        loading.classList.add('hidden');
        iframe.style.display = 'block';
      };
      iframe.onerror = function() {
        loading.classList.add('hidden');
        showError('Failed to load preview deck: ' + deckSrc,
          ['Iframe failed to load ' + deckSrc], currentErrorDetails.runtime);
      };

      // Load the deck
      iframe.src = deckSrc;

      document.title = 'co-deck Preview \u2014 theme:' + theme + ' style:' + style;
    }

    // ── Iframe message handler (runtime error capture) ───────────────────
    function onIframeMessage(event) {
      if (event.data && event.data.type === '__preview_error__') {
        currentErrorDetails.runtime.push(event.data.message);
      }
    }

    // ── Error panel display ────────────────────────────────────────────────
    function showError(summary, contractErrors, runtimeErrors) {
      var errorPanel = document.getElementById('error-panel');
      var iframe = document.getElementById('preview-iframe');
      var loading = document.getElementById('loading-indicator');

      iframe.style.display = 'none';
      loading.classList.add('hidden');

      document.getElementById('error-summary').textContent = summary;
      currentErrorDetails = { contract: contractErrors || [], runtime: runtimeErrors || [] };

      // Render contract errors
      var contractDiv = document.getElementById('contract-errors');
      contractDiv.innerHTML = '';
      if (currentErrorDetails.contract.length === 0) {
        contractDiv.innerHTML = '<p style="opacity:0.5">No contract errors.</p>';
      } else {
        for (var i = 0; i < currentErrorDetails.contract.length; i++) {
          var item = document.createElement('div');
          item.className = 'error-item';
          var pre = document.createElement('pre');
          pre.textContent = currentErrorDetails.contract[i];
          item.appendChild(pre);
          contractDiv.appendChild(item);
        }
      }

      // Render runtime errors
      var runtimeDiv = document.getElementById('runtime-errors');
      runtimeDiv.innerHTML = '';
      if (currentErrorDetails.runtime.length === 0) {
        runtimeDiv.innerHTML = '<p style="opacity:0.5">No runtime errors reported.</p>';
      } else {
        for (var i = 0; i < currentErrorDetails.runtime.length; i++) {
          var item = document.createElement('div');
          item.className = 'error-item';
          var pre = document.createElement('pre');
          pre.textContent = currentErrorDetails.runtime[i];
          item.appendChild(pre);
          runtimeDiv.appendChild(item);
        }
      }

      errorPanel.classList.add('visible');
    }

    // ── Copy error details ────────────────────────────────────────────────
    function copyErrorDetails() {
      var parts = [];
      parts.push('co-deck Preview Error Report');
      parts.push('=============================');
      parts.push('');
      parts.push('Theme: ' + (document.getElementById('theme-select').value || 'N/A'));
      parts.push('Style: ' + (document.getElementById('style-select').value || 'N/A'));
      parts.push('');
      if (currentErrorDetails.contract.length > 0) {
        parts.push('Contract Errors:');
        for (var i = 0; i < currentErrorDetails.contract.length; i++) {
          parts.push('  - ' + currentErrorDetails.contract[i]);
        }
        parts.push('');
      }
      if (currentErrorDetails.runtime.length > 0) {
        parts.push('Runtime Errors:');
        for (var i = 0; i < currentErrorDetails.runtime.length; i++) {
          parts.push('  - ' + currentErrorDetails.runtime[i]);
        }
      }
      var text = parts.join('\n');

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          var btn = document.querySelector('.copy-btn');
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'Copy Error Details';
            btn.classList.remove('copied');
          }, 2000);
        });
      } else {
        // Fallback for file:// protocol
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        var btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy Error Details';
          btn.classList.remove('copied');
        }, 2000);
      }
    }

    // ── Init ───────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      var params = getParams();
      var theme = params.theme;
      var style = params.style;

      // Resolve against the manifest so a stale URL param never references a
      // theme/style that no longer exists.
      var knownThemes = MANIFEST.themes.map(function(t) { return t.name; });
      if (knownThemes.indexOf(theme) < 0) theme = knownThemes[0] || 'outline';

      populateThemeSelect();
      populateStyleSelect(theme);
      document.getElementById('theme-select').value = theme;

      // Validate style against theme's compatible list
      var themeEntry = MANIFEST.themes.find(function(t) { return t.name === theme; });
      if (themeEntry && themeEntry.styles.indexOf(style) < 0) {
        style = themeEntry.styles[0] || style;
      }
      document.getElementById('style-select').value = style;

      currentTheme = theme;
      loadPreview(theme, style);
    });
  </script>
</body>
</html>
