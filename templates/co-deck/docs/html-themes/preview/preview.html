<!DOCTYPE html>
<!--
  preview.html — co-deck Theme x Style Preview Tool
  Usage: open in browser with URL params:
    preview.html?theme=outline&style=classic
    preview.html?theme=zen&style=minimal
  All slide content is hardcoded dummy data — not user input.

  ─────────────────────────────────────────────────────────────────────────────
  DYNAMIC THEME/STYLE DISCOVERY (file://-safe)
  ─────────────────────────────────────────────────────────────────────────────
  The theme + style dropdowns are populated from `themes-manifest.js`, a static
  JS file generated by scripts/co-deck/generate-themes-manifest.ts.

  WHY: A browser opened via file:// cannot scan the filesystem, and fetch() of
  local JSON is blocked by the file protocol. So we load the manifest via a
  plain <script> tag (which assigns window.__THEMES_MANIFEST__).

  REGENERATE the manifest after adding/removing a theme or style:
      bun scripts/co-deck/generate-themes-manifest.ts
  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="ko" data-theme="outline" data-style="premium-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>co-deck Preview</title>
  <link id="base-css" rel="stylesheet" href="../styles/base.css">
  <link id="theme-css" rel="stylesheet" href="../themes/outline/theme.css">
  <link id="style-css" rel="stylesheet" href="../styles/classic/style.css">
  <style>
    #preview-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 8px 16px; font: 13px/1.4 monospace;
      display: flex; align-items: center; gap: 16px;
    }
    #preview-bar label { opacity: 0.7; }
    #preview-bar select { background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 6px; }
    .hint { margin-left: auto; opacity: 0.5; font-size: 11px; }
    body { padding-top: 40px; }
    .slide { min-height: 300px; margin: 0 0 16px; padding: 40px; border-radius: 12px; background: var(--slide-bg, rgba(255,255,255,0.04)); border: 1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body>

  <div id="preview-bar">
    <label>Theme:</label>
    <select id="theme-select" onchange="applyParams()"></select>
    <label>Style:</label>
    <select id="style-select" onchange="applyParams()"></select>
    <span class="hint">preview.html?theme=scroll&amp;style=classic</span>
  </div>

  <div id="slide-host"></div>

  <!-- Manifest: auto-generated, file://-safe global. Regenerate via bun scripts/co-deck/generate-themes-manifest.ts -->
  <script src="themes-manifest.js"></script>
  <script>
    // Hardcoded dummy slide data (6 slides) — not user input
    const SLIDE_DATA = [
      { type: 'cover',    title: '미래 기술의 방향', subtitle: '인공지능과 디지털 전환', meta: '2026-06-21 | 공개 강연', backgroundImage: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80' },
      { type: 'divider',  section: '1부', partNum: 'PART 01', title: '기술 변화의 흐름', desc: '지난 10년간의 핵심 변곡점', backgroundImage: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1920&q=80' },
      { type: 'standard', section: '기술 변화의 흐름', title: '인공지능의 부상', bullets: ['딥러닝 혁명 (2012~)', 'LLM과 생성형 AI (2022~)', '업무 자동화 가속'] },
      { type: 'standard', section: '기술 변화의 흐름', title: '데이터 중심 조직', bullets: ['데이터 리터러시의 중요성', 'AI 도입 장벽과 해결 방안', '사람 + AI 협업 모델'] },
      { type: 'standard', section: '기술 변화의 흐름', title: '미래 역량', bullets: ['비판적 사고와 문제 정의', '크리에이티브 역량', 'AI 도구 활용 능력'] },
      { type: 'punchline', section: '기술 변화의 흐름', title: '변화는 이미 시작되었다' },
      { type: 'profile', section: '기술 변화의 흐름', title: '연사 소개', speakerName: '홍길동', speakerTitle: '수석 연구원', speakerBio: '10년 경력의 AI 전문가' },
      { type: 'contact',  title: '감사합니다', email: 'speaker@example.com', linkedin: 'linkedin.com/in/speaker' }
    ];

    function getParams() {
      const p = new URLSearchParams(location.search);
      return { theme: p.get('theme') || 'outline', style: p.get('style') || 'premium-dark' };
    }

    let currentTheme = null;
    function applyParams() {
      const theme = document.getElementById('theme-select').value;
      // Theme changed → re-populate the style dropdown with the new theme's
      // compatible styles, then default to the first.
      if (theme !== currentTheme) {
        currentTheme = theme;
        populateStyleSelect(theme);
      }
      const style = document.getElementById('style-select').value;
      const url = new URL(location.href);
      url.searchParams.set('theme', theme);
      url.searchParams.set('style', style);
      history.replaceState(null, '', url);
      applyThemeStyle(theme, style);
    }

    // ── Theme paradigm classification ───────────────────────────────────────
    // Themes that use fullscreen stacked layout (one slide visible, prev/next).
    // Everything else falls through to the vertical scroll layout.
    const STACKED_THEMES = new Set([
      'pitch', 'pitch-enhanced', 'outline', 'zen'
    ]);

    // ── Manifest-driven dropdown population ─────────────────────────────────
    // The dropdowns are populated from window.__THEMES_MANIFEST__ (loaded via
    // the themes-manifest.js <script> tag, which is file://-safe). The style
    // list is filtered to the selected theme's compatible `styles`, with
    // `partial_styles` entries marked with a ⚠ glyph so the user knows.
    const MANIFEST = window.__THEMES_MANIFEST__ || { themes: [], styles: [] };

    function populateThemeSelect() {
      const sel = document.getElementById('theme-select');
      const cur = sel.value;
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      for (const t of MANIFEST.themes) {
        const opt = el('option', null, t.name);
        opt.value = t.name;
        sel.appendChild(opt);
      }
      if (cur && MANIFEST.themes.some((t) => t.name === cur)) sel.value = cur;
    }

    function populateStyleSelect(themeName) {
      const sel = document.getElementById('style-select');
      const cur = sel.value;
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      const theme = MANIFEST.themes.find((t) => t.name === themeName);
      // If the theme is unknown, fall back to the global styles list.
      const styleNames = theme ? theme.styles : MANIFEST.styles;
      const partial = new Set(theme ? (theme.partial_styles || []) : []);
      for (const s of styleNames) {
        const label = partial.has(s) ? s + ' (⚠ partial)' : s;
        const opt = el('option', null, label);
        opt.value = s;
        sel.appendChild(opt);
      }
      if (cur && styleNames.includes(cur)) sel.value = cur;
    }

    function applyThemeStyle(theme, style) {
      // If the requested style isn't compatible with the theme, fall back to the
      // theme's first available style (manifest may have changed since URL was set).
      const themeEntry = MANIFEST.themes.find((t) => t.name === theme);
      let effectiveStyle = style;
      if (themeEntry && Array.isArray(themeEntry.styles) && themeEntry.styles.length > 0
          && !themeEntry.styles.includes(style)) {
        effectiveStyle = themeEntry.styles[0];
        const sel = document.getElementById('style-select');
        if (sel) sel.value = effectiveStyle;
      }
      document.documentElement.dataset.theme = theme;
      document.documentElement.dataset.style = effectiveStyle;
      const themeLink = document.getElementById('theme-css');
      themeLink.href = '../themes/' + theme + '/theme.css';
      const styleLink = document.getElementById('style-css');
      styleLink.href = '../styles/' + effectiveStyle + '/style.css';
      document.title = 'co-deck Preview — theme:' + theme + ' style:' + effectiveStyle;
      renderSlides(theme);
    }

    function el(tag, styles, text) {
      const e = document.createElement(tag);
      if (styles) Object.assign(e.style, styles);
      if (text !== undefined) e.textContent = text;
      return e;
    }

    function buildSlideEl(data) {
      const div = document.createElement('div');
      div.className = 'slide';
      div.dataset.type = data.type;
      if (data.backgroundImage) {
        div.style.setProperty('--slide-bg-image', 'url(' + data.backgroundImage + ')');
        div.dataset.bg = 'true';
      }

      if (data.type === 'cover') {
        const wrap = el('div', { textAlign: 'center', padding: '40px 0' });
        wrap.appendChild(el('div', { fontSize: '2em', fontWeight: 'bold', color: 'var(--text-primary,#fff)', marginBottom: '12px' }, data.title));
        wrap.appendChild(el('div', { fontSize: '1.1em', color: 'var(--text-muted,rgba(255,255,255,0.6))' }, data.subtitle || ''));
        wrap.appendChild(el('div', { marginTop: '24px', fontSize: '0.85em', color: 'var(--text-muted,rgba(255,255,255,0.4))' }, data.meta || ''));
        div.appendChild(wrap);
      } else if (data.type === 'divider') {
        const wrap = el('div', { padding: '20px 0' });
        wrap.appendChild(el('div', { fontSize: '0.8em', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--accent-color,#d97706)', marginBottom: '8px' }, data.partNum || ''));
        wrap.appendChild(el('div', { fontSize: '1.8em', fontWeight: 'bold', color: 'var(--text-primary,#fff)', marginBottom: '8px' }, data.title));
        wrap.appendChild(el('div', { color: 'var(--text-muted,rgba(255,255,255,0.6))' }, data.desc || ''));
        div.appendChild(wrap);
      } else if (data.type === 'contact') {
        const wrap = el('div', { textAlign: 'center', padding: '40px 0' });
        wrap.appendChild(el('div', { fontSize: '1.6em', fontWeight: 'bold', color: 'var(--text-primary,#fff)', marginBottom: '24px' }, data.title));
        wrap.appendChild(el('div', { color: 'var(--text-muted,rgba(255,255,255,0.6))', lineHeight: '2' }, data.email + ' · ' + data.linkedin));
        div.appendChild(wrap);
      } else if (data.type === 'punchline') {
        const wrap = el('div', { textAlign: 'center', padding: '40px 0' });
        wrap.appendChild(el('div', { fontSize: '2em', fontWeight: 'bold', color: 'var(--text-primary,#fff)' }, data.title));
        div.appendChild(wrap);
      } else if (data.type === 'profile') {
        const wrap = el('div', { padding: '20px 0' });
        wrap.appendChild(el('div', { fontSize: '1.4em', fontWeight: 'bold', color: 'var(--text-primary,#fff)' }, data.speakerName || data.title));
        if (data.speakerTitle) wrap.appendChild(el('div', { color: 'var(--text-muted,rgba(255,255,255,0.6))', marginTop: '8px' }, data.speakerTitle));
        if (data.speakerBio) wrap.appendChild(el('div', { color: 'var(--text-muted,rgba(255,255,255,0.5))', marginTop: '4px', fontSize: '0.9em' }, data.speakerBio));
        div.appendChild(wrap);
      } else {
        const wrap = el('div');
        wrap.appendChild(el('div', { fontSize: '0.75em', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text-muted,rgba(255,255,255,0.4))', marginBottom: '6px' }, data.section || ''));
        wrap.appendChild(el('div', { fontSize: '1.3em', fontWeight: 'bold', color: 'var(--text-primary,#fff)', marginBottom: '16px' }, data.title));
        const ul = el('ul', { margin: '0', paddingLeft: '20px' });
        (data.bullets || []).forEach(b => ul.appendChild(el('li', { margin: '6px 0', color: 'var(--text-body,rgba(255,255,255,0.85))' }, b)));
        wrap.appendChild(ul);
        div.appendChild(wrap);
      }
      return div;
    }

    function renderSlides(theme) {
      const host = document.getElementById('slide-host');
      // Remove all child nodes safely
      while (host.firstChild) host.removeChild(host.firstChild);

      if (STACKED_THEMES.has(theme)) {
        // Fullscreen stacked: one slide visible at a time, prev/next, keyboard nav
        // (pitch, pitch-enhanced, outline, zen)
        const outer = el('div', { maxWidth: '900px', margin: '20px auto', position: 'relative', aspectRatio: '16/9' });
        SLIDE_DATA.forEach((data, i) => {
          const s = buildSlideEl(data);
          Object.assign(s.style, { position: 'absolute', inset: '0', opacity: i === 0 ? '1' : '0', transition: 'opacity 0.45s' });
          s.id = 'slide-' + i;
          outer.appendChild(s);
        });
        host.appendChild(outer);

        const counter = el('div', { position: 'fixed', bottom: '20px', right: '24px', fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)' });
        counter.id = 'slide-counter';
        host.appendChild(counter);
        currentSlide = 0;
        updateCounter();
      } else {
        // Scroll: vertical list with TOC
        const viewer = el('div', { display: 'flex' });
        viewer.id = 'viewer';

        const toc = el('aside', { width: '200px', minHeight: '100vh', padding: '60px 12px 20px', borderRight: '1px solid rgba(255,255,255,0.08)', flexShrink: '0' });
        toc.id = 'toc-panel';
        const tocList = el('ul', { listStyle: 'none', margin: '0', padding: '0' });
        tocList.id = 'toc-list';
        toc.appendChild(tocList);
        viewer.appendChild(toc);

        const main = el('main', { flex: '1', padding: '20px' });
        main.id = 'slide-container';
        SLIDE_DATA.forEach((data, i) => {
          const s = buildSlideEl(data);
          s.id = 'slide-' + i;
          main.appendChild(s);

          const li = el('li', { padding: '4px 8px', cursor: 'pointer', borderRadius: '4px', fontSize: '0.8em', color: 'rgba(255,255,255,0.6)', marginBottom: '2px' },
            data.type === 'cover' ? '표지' : data.type === 'divider' ? '◆ ' + data.title : data.type === 'punchline' ? '★ ' + data.title : data.type === 'profile' ? '👤 ' + (data.speakerName || data.title) : (i + '. ' + data.title));
          li.addEventListener('click', () => document.getElementById('slide-' + i).scrollIntoView({ behavior: 'smooth' }));
          tocList.appendChild(li);
        });
        viewer.appendChild(main);
        host.appendChild(viewer);
      }
    }

    // Slideshow navigation
    let currentSlide = 0;
    function updateCounter() {
      const counter = document.getElementById('slide-counter');
      if (counter) counter.textContent = (currentSlide + 1) + ' / ' + SLIDE_DATA.length;
    }
    function showSlide(index) {
      const slides = document.querySelectorAll('.slide');
      if (index < 0 || index >= slides.length) return;
      slides.forEach(s => { s.style.opacity = '0'; s.style.pointerEvents = 'none'; });
      slides[index].style.opacity = '1';
      slides[index].style.pointerEvents = 'auto';
      currentSlide = index;
      updateCounter();
    }
    function changeSlide(delta) { showSlide(currentSlide + delta); }
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
    });

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      let { theme, style } = getParams();
      // Resolve against the manifest so a stale URL param never references a
      // theme/style that no longer exists.
      const knownThemes = MANIFEST.themes.map((t) => t.name);
      if (!knownThemes.includes(theme)) theme = knownThemes[0] || 'outline';
      populateThemeSelect();
      populateStyleSelect(theme);
      document.getElementById('theme-select').value = theme;
      const themeEntry = MANIFEST.themes.find((t) => t.name === theme);
      if (themeEntry && Array.isArray(themeEntry.styles) && !themeEntry.styles.includes(style)) {
        style = themeEntry.styles[0] || style;
      }
      document.getElementById('style-select').value = style;
      currentTheme = theme;
      applyThemeStyle(theme, style);
    });
  </script>
</body>
</html>
