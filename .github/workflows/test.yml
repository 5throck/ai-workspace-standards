name: Test Suite

on:
  push:
    branches: [ main, 'pr/**' ]
  pull_request:
    branches: [ main, 'pr/**' ]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad6b6d6d3d7177b5f3d8b8e060b4958ead
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun run test

      - name: Run E2E scenario tests
        shell: pwsh
        run: |
          if ($IsWindows -eq $true) {
            bun run test:e2e
          } else {
            echo "Skipping E2E tests on non-Windows (requires PowerShell)"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            test-results/
            tests/*.log
