name: Test Suite

on:
  push:
    branches: [ main, 'pr/**' ]
  pull_request:
    branches: [ main, 'pr/**' ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # gitleaks-action diffs the head commit against its immediate parent;
          # the default shallow (depth-1) clone has no parent to diff against,
          # which fails with "ambiguous argument ...^..." on pull_request events.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Security audit - dependency vulnerabilities
        shell: bash
        run: |
          audit_output=$(bun audit 2>&1) || true
          echo "$audit_output"
          if echo "$audit_output" | grep -qE '[1-9][0-9]* (high|critical)'; then
            echo "ERROR: High or critical vulnerabilities found. See audit output above."
            exit 1
          fi
          echo "Security check passed (no high/critical vulnerabilities)."

      - name: Secret scanning - gitleaks
        # Docker-container action — Linux runners only, hence the ubuntu-only
        # condition below (this job's matrix also includes windows/macos).
        # PR-diff scan only (the action's default mode compares against the PR's
        # base ref); full-history secret scanning is a separate, heavier security
        # audit and is not covered here.
        if: matrix.os == 'ubuntu-latest'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate templates
        run: bun run validate-templates

      - name: Run integration tests
        run: bun run test

      - name: Run E2E scenario tests
        shell: pwsh
        run: |
          if ($IsWindows -eq $true) {
            bun run test:e2e
          } else {
            echo "Skipping E2E tests on non-Windows (requires PowerShell)"
          }

      - name: Tier 3 Auditor - Lifecycle Compliance Check
        shell: pwsh
        run: |
          Write-Host "=== Tier 3 Auditor: Lifecycle Compliance Audit ===" -ForegroundColor Cyan

          # Run lifecycle audit tools
          Write-Host "Running agent lifecycle audit..." -ForegroundColor Yellow
          bun run agent-lifecycle-audit

          Write-Host "Running skill lifecycle audit..." -ForegroundColor Yellow
          bun run skill-lifecycle-audit

          Write-Host "Running README lifecycle audit..." -ForegroundColor Yellow
          bun run readme-lifecycle-audit

          Write-Host "Running scripts verification..." -ForegroundColor Yellow
          bun run verify-scripts

          Write-Host "✅ Tier 3 Auditor: All lifecycle checks passed" -ForegroundColor Green

      - name: L0→L1 drift check (propagation-map integrity)
        shell: bash
        run: |
          # --check-drift exits 1 when any drift is found. gemini-settings has
          # known intentional L2 variant overrides (PostToolUse lifecycle hooks)
          # that will always differ from L1. Allow exit 1 but fail if any domain
          # OTHER than gemini-settings appears in the drift report — that would
          # indicate a regression (e.g. l2_drift_eligible misconfiguration).
          DRIFT_OUTPUT=$(bun scripts/propagate-to-templates.ts --check-drift 2>&1 || true)
          echo "$DRIFT_OUTPUT"
          # Strip ANSI escapes, remove gemini-settings lines, check for remaining drift
          if echo "$DRIFT_OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | grep -v "^gemini-settings" | grep -qi "differ\|missing\|extra"; then
            echo "ERROR: Unexpected drift detected in non-gemini-settings domain"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            test-results/
            tests/*.log
