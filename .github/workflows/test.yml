name: Test Suite

on:
  push:
    branches: [ main, 'pr/**' ]
  pull_request:
    branches: [ main, 'pr/**' ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun run test

      - name: Run E2E scenario tests
        shell: pwsh
        run: |
          if ($IsWindows -eq $true) {
            bun run test:e2e
          } else {
            echo "Skipping E2E tests on non-Windows (requires PowerShell)"
          }

      - name: Tier 3 Auditor - Lifecycle Compliance Check
        shell: pwsh
        run: |
          Write-Host "=== Tier 3 Auditor: Lifecycle Compliance Audit ===" -ForegroundColor Cyan

          # Run lifecycle audit tools
          Write-Host "Running agent lifecycle audit..." -ForegroundColor Yellow
          bun run agent-lifecycle-audit

          Write-Host "Running skill lifecycle audit..." -ForegroundColor Yellow
          bun run skill-lifecycle-audit

          Write-Host "Running README lifecycle audit..." -ForegroundColor Yellow
          bun run readme-lifecycle-audit

          Write-Host "Running scripts verification..." -ForegroundColor Yellow
          bun run verify-scripts

          Write-Host "✅ Tier 3 Auditor: All lifecycle checks passed" -ForegroundColor Green

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            test-results/
            tests/*.log
